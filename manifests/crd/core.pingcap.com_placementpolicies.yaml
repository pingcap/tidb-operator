---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
    pingcap.com/version: ${CRD_VERSION}
  name: placementpolicies.core.pingcap.com
spec:
  group: core.pingcap.com
  names:
    categories:
    - policy
    kind: PlacementPolicy
    listKind: PlacementPolicyList
    plural: placementpolicies
    shortNames:
    - pp
    singular: placementpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cluster.name
      name: Cluster
      type: string
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PlacementPolicy defines PD placement rules for selected key ranges.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PlacementPolicySpec defines placement policy target groups
              and rules.
            properties:
              cluster:
                description: |-
                  ClusterReference is a reference to cluster
                  NOTE: namespace may be added into the reference in the future
                properties:
                  name:
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                    type: string
                    x-kubernetes-validations:
                    - message: cluster name is immutable
                      rule: self == oldSelf
                required:
                - name
                type: object
              groupRefs:
                description: GroupRefs selects TiKV groups that receive all rules
                  in this policy.
                items:
                  description: PlacementPolicyGroupRef references a placement-capable
                    group.
                  properties:
                    group:
                      enum:
                      - core.pingcap.com
                      type: string
                    kind:
                      enum:
                      - TiKVGroup
                      type: string
                    name:
                      minLength: 1
                      type: string
                  required:
                  - group
                  - kind
                  - name
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - group
                - kind
                - name
                x-kubernetes-list-type: map
              rules:
                description: Rules defines key range placement rules applied to every
                  groupRef.
                items:
                  description: PlacementPolicyRule defines one user-visible placement
                    rule.
                  properties:
                    count:
                      format: int32
                      minimum: 1
                      type: integer
                    name:
                      minLength: 1
                      type: string
                    role:
                      enum:
                      - voter
                      type: string
                    selector:
                      description: PlacementPolicySelector selects a key range by
                        friendly identifiers.
                      properties:
                        keyspace:
                          description: Selector to select key range by keyspace
                          properties:
                            ids:
                              description: |-
                                Keyspaces selects PD keyspace IDs. Database and table selectors are reserved
                                for a later version because their key ranges are unstable today.
                              items:
                                pattern: ^(0|[1-9][0-9]*)$
                                type: string
                              minItems: 1
                              type: array
                              uniqueItems: true
                              x-kubernetes-list-type: set
                          required:
                          - ids
                          type: object
                      type: object
                      x-kubernetes-validations:
                      - message: selector.keyspace is required
                        rule: has(self.keyspace)
                  required:
                  - count
                  - name
                  - role
                  - selector
                  type: object
                minItems: 1
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            required:
            - cluster
            - groupRefs
            - rules
            type: object
          status:
            description: PlacementPolicyStatus records synced PD placement bundles.
            properties:
              conditions:
                description: Conditions contain details of the current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed by the controller.
                  It's used to determine whether the controller has reconciled the latest spec.
                format: int64
                type: integer
            type: object
        type: object
    selectableFields:
    - jsonPath: .spec.cluster.name
    served: true
    storage: true
    subresources:
      status: {}
